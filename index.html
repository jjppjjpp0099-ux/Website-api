<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Like Booster - Live</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0a0a0a; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #151515; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px #00d2ff; width: 90%; max-width: 400px; border: 1px solid #333; text-align: center; }
        h1 { color: #00d2ff; font-size: 24px; margin-bottom: 20px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 15px; margin-top: 10px; border-radius: 8px; border: none; background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.02); filter: brightness(1.2); }
        #response { margin-top: 20px; padding: 15px; border-radius: 8px; background: #1a1a1a; display: none; text-align: left; border-left: 5px solid #00d2ff; line-height: 1.6; }
        .loading { display: none; color: #00d2ff; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>FF LIKE BOT</h1>
    <input type="number" id="uid" placeholder="Enter Player UID (e.g. 3237151070)">
    <select id="server_name">
        <option value="ind">India (IND)</option>
        <option value="br">Brazil (BR)</option>
        <option value="us">USA (US)</option>
    </select>
    <button onclick="sendLikes()">SEND 20 LIKES</button>
    
    <div id="loader" class="loading">Sending Likes... Please Wait 🚀</div>
    <div id="response"></div>
</div>

<script>
    async function sendLikes() {
        const uid = document.getElementById('uid').value;
        const server = document.getElementById('server_name').value;
        const respDiv = document.getElementById('response');
        const loader = document.getElementById('loader');

        if(!uid) return alert("Bhai UID toh daal do!");

        respDiv.style.display = 'none';
        loader.style.display = 'block';

        try {
            // Aapki Vercel API ka sahi URL
            const url = `https://website-api-lemon.vercel.app/like?uid=${uid}&server_name=${server}`;
            
            const response = await fetch(url);
            const data = await response.json();

            loader.style.display = 'none';
            respDiv.style.display = 'block';

            if(data.status === 1 || data.LikesafterCommand) {
                respDiv.innerHTML = `
                    <b style="color:#00ff00;">✅ SUCCESSFUL!</b><br>
                    <b>Name:</b> ${data.PlayerNickname}<br>
                    <b>Before:</b> ${data.LikesbeforeCommand}<br>
                    <b>After:</b> ${data.LikesafterCommand}<br>
                    <b>Added:</b> +${data.LikesGivenByAPI} Likes
